<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roleplay Realm</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300..600;1,300..600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0b0f19] text-white overflow-hidden h-screen w-screen flex items-center justify-center antialiased">

<canvas id="bg-canvas" class="fixed inset-0 w-full h-full pointer-events-none"></canvas>

<div class="relative z-10 w-full max-w-md px-6">
    <div class="mb-10 text-center">
        <h1 class="text-3xl font-bold tracking-tight mb-2">Roleplay Realm</h1>
        <p class="text-gray-500 text-sm">Enter your details to begin.</p>
    </div>
    <form id="auth-form" class="flex flex-col gap-4">
        <div>
            <label class="block text-sm font-medium text-gray-400 mb-2">Username</label>
            <input type="text" id="username" class="auth-input" placeholder="Your name in the story" autocomplete="off" maxlength="32">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-400 mb-2">Gemini API Key</label>
            <div class="relative">
                <input type="password" id="api-key" class="auth-input pr-12" placeholder="AIza...">
                <button type="button" id="toggle-pw" class="absolute right-3 top-3 text-gray-500 hover:text-white transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                </button>
            </div>
        </div>
        <p id="error-msg" class="hidden text-red-400 text-sm text-center"></p>
        <button type="submit" class="mt-2 w-full py-3 bg-[#2a2f45] hover:bg-[#363c57] text-white rounded-xl font-medium transition-colors">Enter Realm</button>
        <p class="text-center text-xs text-gray-600 mt-1">Get a free API key at <a href="https://aistudio.google.com" target="_blank" class="text-gray-400 hover:text-white underline underline-offset-2">aistudio.google.com</a></p>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
